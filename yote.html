<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>薄明帳 · 儚い予定</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #fefafd;  /* 柔らかな白桃色 */
            font-family: 'Segoe UI', 'Noto Sans JP', 'Helvetica Neue', '游ゴシック', system-ui, -apple-system, sans-serif;
            padding: 2rem 1.5rem;
            position: relative;
            transition: background-color 0.2s;
        }

        /* とても薄い空気のような装飾 — 線ではなく、かすかな影 */
        body::before {
            content: "";
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            bottom: 1.5rem;
            box-shadow: 0 0 0 0.5px rgba(200, 180, 210, 0.2), 0 4px 20px rgba(0, 0, 0, 0.01);
            pointer-events: none;
            z-index: 0;
            border-radius: 28px;
        }

        /* 主容器 — 玻璃感、ほとんど枠線なし */
        .glass-panel {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 252, 254, 0.7);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 28px -8px rgba(0, 0, 0, 0.02), 0 0 0 0.5px rgba(210, 190, 225, 0.3);
            padding: 2rem 2rem 2rem;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
            border-radius: 32px;
        }

        /* ヘッダー 細く、品よく */
        .title-section {
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            padding-bottom: 0.5rem;
            border-bottom: 0.5px solid rgba(190, 170, 210, 0.3);
        }
        .app-title {
            font-size: 1.5rem;
            font-weight: 380;
            letter-spacing: 1.5px;
            color: #b290b0;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            width: auto;
            padding: 0 0px;
        }
        .app-title:hover {
            background: rgba(210, 190, 230, 0.08);
        }
        .sub {
            font-size: 0.65rem;
            color: #d4bad6;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* 設定 — 極力線を抑える */
        .settings-bar {
            background: rgba(250, 245, 252, 0.35);
            margin-bottom: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.8rem;
            gap: 12px;
            border-radius: 40px;
        }
        .theme-options {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }
        .theme-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #c2a8ce;
        }
        .theme-item input, .theme-item select {
            background: rgba(255, 252, 254, 0.8);
            border: 0.5px solid #e5d8ef;
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 20px;
            color: #886e9e;
        }
        .settings-toggle {
            cursor: pointer;
            font-size: 0.7rem;
            color: #c2a8ce;
            background: rgba(220, 205, 235, 0.3);
            padding: 4px 14px;
            border-radius: 30px;
            transition: 0.1s;
        }
        .settings-toggle:hover {
            background: rgba(210, 185, 230, 0.5);
            color: #fefafd;
        }

        /* 详细设定面板 */
        .extra-settings {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 12px;
            padding: 12px 0;
            border-top: 0.5px solid rgba(200, 180, 220, 0.2);
        }
        .extra-settings.open {
            display: grid;
        }

        /* 入力モード切り替え — 繊細なタブ */
        .mode-switch {
            display: flex;
            gap: 20px;
            margin-bottom: 1.2rem;
            border-bottom: 0.5px solid rgba(190, 170, 210, 0.25);
            padding-bottom: 6px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            font-size: 0.7rem;
            padding: 4px 0;
            color: #c8b2d6;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.1s;
            font-weight: 400;
        }
        .mode-btn.active {
            color: #b08eb2;
            border-bottom: 1px solid #dac2e4;
        }

        /* 入力エリア 軽い影のみ */
        .single-input {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        .task-input {
            flex: 1;
            background: rgba(255, 252, 254, 0.7);
            border: none;
            border-bottom: 0.5px solid #e2d4ec;
            padding: 10px 0px;
            font-size: 0.85rem;
            color: #5f4a72;
            outline: none;
            transition: 0.1s;
            font-family: inherit;
        }
        .task-input:focus {
            border-bottom-color: #d4bce4;
            background: rgba(255, 252, 254, 0.9);
        }
        .add-btn {
            background: #e5d8ef;
            border: none;
            padding: 0 22px;
            font-weight: 400;
            color: #a482b2;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-radius: 40px;
        }
        .add-btn:hover {
            background: #dccae8;
        }

        /* 一括入力エリア */
        .multi-input-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .batch-textarea {
            width: 100%;
            background: rgba(255, 252, 254, 0.7);
            border: none;
            border-bottom: 0.5px solid #e2d4ec;
            padding: 10px 0px;
            font-size: 0.8rem;
            color: #5f4a72;
            outline: none;
            font-family: inherit;
            resize: vertical;
            line-height: 1.5;
        }
        .batch-textarea:focus {
            border-bottom-color: #d4bce4;
        }
        .batch-add-btn {
            align-self: flex-end;
            background: #e5d8ef;
            border: none;
            padding: 6px 24px;
            font-weight: 400;
            color: #a482b2;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-radius: 40px;
        }
        .hide-mode {
            display: none;
        }

        /* 統計 & フィルター */
        .stats-filter {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0 1.2rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .stats {
            background: rgba(245, 238, 252, 0.4);
            padding: 4px 14px;
            font-size: 0.7rem;
            color: #bca8ce;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .stats span {
            font-weight: 500;
            color: #d0b2d4;
        }
        .filter-group {
            display: flex;
            gap: 8px;
        }
        .filter-btn {
            background: transparent;
            border: none;
            padding: 4px 12px;
            font-size: 0.65rem;
            color: #c2a8ce;
            cursor: pointer;
            transition: 0.1s;
            border-radius: 30px;
        }
        .filter-btn.active {
            background: #efe4f5;
            color: #9a7aaa;
        }

        /* タスクリスト — 枠線をなくし、間隔で区切る */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .task-list::-webkit-scrollbar {
            width: 3px;
        }
        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #e0d0ec;
            border-radius: 10px;
        }
        .task-item {
            background: transparent;
            padding: 10px 0px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.1s;
            border-bottom: 0.5px solid rgba(190, 170, 210, 0.2);
        }
        .task-item:hover {
            background: rgba(240, 230, 248, 0.3);
            padding-left: 6px;
            border-radius: 24px;
        }
        .task-check {
            width: 18px;
            height: 18px;
            accent-color: #dbb8da;
            cursor: pointer;
            opacity: 0.8;
        }
        .task-text {
            flex: 1;
            font-size: 0.85rem;
            color: #6f5284;
            word-break: break-word;
            cursor: pointer;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .task-priority {
            font-size: 0.6rem;
            padding: 2px 10px;
            background: rgba(215, 195, 230, 0.3);
            color: #b592c0;
            border-radius: 30px;
        }
        .priority-high {
            background: rgba(220, 180, 210, 0.3);
            color: #ce9ab8;
        }
        .task-actions {
            display: flex;
            gap: 6px;
            opacity: 0.5;
            transition: opacity 0.1s;
        }
        .task-item:hover .task-actions {
            opacity: 1;
        }
        .task-btn {
            background: transparent;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            color: #cab5dc;
            padding: 2px 6px;
            border-radius: 30px;
        }
        .task-btn:hover {
            background: rgba(210, 185, 230, 0.3);
            color: #a57eb8;
        }
        .completed .task-text {
            text-decoration: line-through;
            color: #cbbad9;
        }
        .empty-tip {
            text-align: center;
            padding: 48px 20px;
            color: #dbcae8;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .footer-clean {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
        }
        .clean-btn {
            background: rgba(245, 238, 252, 0.4);
            border: none;
            padding: 5px 18px;
            font-size: 0.65rem;
            color: #bca8ce;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.1s;
        }
        .clean-btn:hover {
            background: #e5d8ef;
            color: #a482b2;
        }

        /* 小さな装飾ドット (線じゃない) */
        .glass-panel::after {
            content: "❀";
            position: absolute;
            bottom: 18px;
            right: 24px;
            font-size: 11px;
            color: rgba(200, 180, 220, 0.25);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="title-section">
        <input type="text" class="app-title" id="appTitle" value="薄明帳" maxlength="20">
        <div class="sub">—— 儚い予定をそっと ——</div>
    </div>

    <div class="settings-bar">
        <div class="theme-options">
            <div class="theme-item">🎨 主色 <input type="color" id="primaryColor" value="#efe4f5"></div>
            <div class="theme-item">🌸 背景 <input type="color" id="bgColor" value="#fefafd"></div>
            <div class="theme-item">✧ 文字色 <input type="color" id="textColor" value="#6f5284"></div>
        </div>
        <div class="settings-toggle" id="settingsToggle">✧ その他</div>
    </div>

    <div class="extra-settings" id="extraSettings">
        <div class="theme-item">ぼかし強度 <input type="range" id="blurStrength" min="4" max="28" step="2" value="20"></div>
        <div class="theme-item">カードの丸み <input type="range" id="cornerRound" min="12" max="40" step="2" value="32"></div>
    </div>

    <!-- 二重入力モード -->
    <div class="mode-switch">
        <button class="mode-btn active" data-mode="single">ひとつずつ記す</button>
        <button class="mode-btn" data-mode="batch">文章を分ける</button>
    </div>

    <div id="singleModeArea" class="input-area">
        <div class="single-input">
            <input type="text" class="task-input" id="taskInput" placeholder="新しい予定を書く …" autocomplete="off">
            <button class="add-btn" id="addTaskBtn">+ 記す</button>
        </div>
    </div>

    <div id="batchModeArea" class="input-area hide-mode">
        <div class="multi-input-area">
            <textarea class="batch-textarea" id="batchText" rows="3" placeholder="文章をそのまま貼り付けてください&#10;例：&#10;珈琲を淹れる&#10;窓辺で本を開く&#10;夕空に手紙を書く"></textarea>
            <button class="batch-add-btn" id="batchAddBtn">✧ 分割して追加 ✧</button>
        </div>
    </div>

    <div class="stats-filter">
        <div class="stats">📖 全 <span id="totalCount">0</span> · 叶えた <span id="completedCount">0</span></div>
        <div class="filter-group">
            <button class="filter-btn" data-filter="all">全て</button>
            <button class="filter-btn" data-filter="active">未完了</button>
            <button class="filter-btn" data-filter="completed">完了</button>
        </div>
    </div>

    <div class="task-list" id="taskListContainer">
        <div class="empty-tip">✧ 予定はまだありません ✧</div>
    </div>

    <div class="footer-clean">
        <button class="clean-btn" id="clearCompletedBtn">叶えた予定を消す</button>
    </div>
</div>

<script>
    (function(){
        let tasks = [];
        let currentFilter = "all";
        let currentMode = "single";

        // DOM 要素
        const taskContainer = document.getElementById("taskListContainer");
        const singleModeArea = document.getElementById("singleModeArea");
        const batchModeArea = document.getElementById("batchModeArea");
        const modeBtns = document.querySelectorAll(".mode-btn");
        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addTaskBtn");
        const batchTextarea = document.getElementById("batchText");
        const batchAddBtn = document.getElementById("batchAddBtn");
        const totalSpan = document.getElementById("totalCount");
        const completedSpan = document.getElementById("completedCount");
        const filterBtns = document.querySelectorAll(".filter-btn");
        const clearCompletedBtn = document.getElementById("clearCompletedBtn");
        const appTitleInput = document.getElementById("appTitle");
        
        // カスタマイズ要素
        const primaryColorPicker = document.getElementById("primaryColor");
        const bgColorPicker = document.getElementById("bgColor");
        const textColorPicker = document.getElementById("textColor");
        const blurStrengthSlider = document.getElementById("blurStrength");
        const cornerRoundSlider = document.getElementById("cornerRound");
        const settingsToggle = document.getElementById("settingsToggle");
        const extraSettings = document.getElementById("extraSettings");

        // データ操作
        function saveTasks() {
            localStorage.setItem("hakumei_tasks", JSON.stringify(tasks));
            updateStats();
        }
        function loadTasks() {
            const saved = localStorage.getItem("hakumei_tasks");
            if(saved) tasks = JSON.parse(saved);
            if(!tasks.length) {
                tasks = [
                    { id: Date.now()+1, text: "珈琲を淹れる", completed: false, priority: "normal" },
                    { id: Date.now()+2, text: "窓辺で本を開く", completed: false, priority: "high" },
                    { id: Date.now()+3, text: "夕空に手紙を書く", completed: false, priority: "normal" }
                ];
                saveTasks();
            }
            renderTasks();
        }
        function updateStats() {
            totalSpan.innerText = tasks.length;
            completedSpan.innerText = tasks.filter(t=>t.completed).length;
        }
        function escapeHtml(str) {
            if(!str) return "";
            return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;');
        }
        function renderTasks() {
            let filtered = tasks;
            if(currentFilter === "active") filtered = tasks.filter(t=>!t.completed);
            if(currentFilter === "completed") filtered = tasks.filter(t=>t.completed);
            if(filtered.length===0) {
                taskContainer.innerHTML = `<div class="empty-tip">✧ ひとひらの予定もありません ✧</div>`;
                return;
            }
            let html = "";
            filtered.forEach(task => {
                const completedClass = task.completed ? "completed" : "";
                const priorityClass = task.priority === "high" ? "priority-high" : "";
                const priorityText = task.priority === "high" ? "大切" : "日常";
                const checkedAttr = task.completed ? "checked" : "";
                html += `
                    <div class="task-item ${completedClass}" data-id="${task.id}">
                        <input type="checkbox" class="task-check" ${checkedAttr}>
                        <div class="task-text" data-id="${task.id}">${escapeHtml(task.text)}</div>
                        <div class="task-priority ${priorityClass}">${priorityText}</div>
                        <div class="task-actions">
                            <button class="task-btn edit-priority" data-id="${task.id}" title="優先度">⚜</button>
                            <button class="task-btn delete-task" data-id="${task.id}" title="削除">✕</button>
                        </div>
                    </div>
                `;
            });
            taskContainer.innerHTML = html;
            attachEvents();
        }
        function attachEvents() {
            document.querySelectorAll(".task-check").forEach(cb => {
                cb.addEventListener("change", (e) => {
                    const id = parseInt(cb.closest(".task-item").dataset.id);
                    const task = tasks.find(t=>t.id===id);
                    if(task) { task.completed = cb.checked; saveTasks(); renderTasks(); }
                });
            });
            document.querySelectorAll(".delete-task").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    tasks = tasks.filter(t=>t.id!==id);
                    saveTasks(); renderTasks();
                });
            });
            document.querySelectorAll(".task-text").forEach(div => {
                div.addEventListener("dblclick", (e) => {
                    const id = parseInt(div.dataset.id);
                    const task = tasks.find(t=>t.id===id);
                    if(!task) return;
                    const newText = prompt("予定を編集", task.text);
                    if(newText && newText.trim()) { task.text = newText.trim(); saveTasks(); renderTasks(); }
                });
            });
            document.querySelectorAll(".edit-priority").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    const task = tasks.find(t=>t.id===id);
                    if(task) { task.priority = task.priority==="high" ? "normal" : "high"; saveTasks(); renderTasks(); }
                });
            });
        }

        function addSingleTask() {
            const text = taskInput.value.trim();
            if(!text) return;
            tasks.unshift({ id: Date.now(), text, completed: false, priority: "normal" });
            saveTasks(); renderTasks();
            taskInput.value = ""; taskInput.focus();
        }
        function addBatchTasks() {
            let raw = batchTextarea.value;
            if(!raw.trim()) return;
            let lines = raw.split(/\r?\n/);
            let added = false;
            for(let line of lines) {
                let trimmed = line.trim();
                if(trimmed !== "") {
                    tasks.unshift({ id: Date.now() + Math.random(), text: trimmed, completed: false, priority: "normal" });
                    added = true;
                }
            }
            if(added) { saveTasks(); renderTasks(); batchTextarea.value = ""; }
        }
        addBtn.addEventListener("click", addSingleTask);
        taskInput.addEventListener("keypress", (e) => { if(e.key==="Enter") addSingleTask(); });
        batchAddBtn.addEventListener("click", addBatchTasks);

        function switchMode(mode) {
            currentMode = mode;
            if(mode === "single") {
                singleModeArea.classList.remove("hide-mode");
                batchModeArea.classList.add("hide-mode");
            } else {
                singleModeArea.classList.add("hide-mode");
                batchModeArea.classList.remove("hide-mode");
            }
            modeBtns.forEach(btn => {
                if(btn.dataset.mode === mode) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }
        modeBtns.forEach(btn => {
            btn.addEventListener("click", () => switchMode(btn.dataset.mode));
        });

        clearCompletedBtn.addEventListener("click", () => {
            tasks = tasks.filter(t=>!t.completed);
            saveTasks(); renderTasks();
        });
        filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                currentFilter = btn.dataset.filter;
                filterBtns.forEach(b=>b.classList.remove("active"));
                btn.classList.add("active");
                renderTasks();
            });
        });

        // テーマ適用（軽やか）
        function applyTheme() {
            const primary = primaryColorPicker.value;
            const bgColor = bgColorPicker.value;
            const textColor = textColorPicker.value;
            const blurVal = blurStrengthSlider.value;
            const corner = cornerRoundSlider.value;

            document.body.style.backgroundColor = bgColor;
            const panel = document.querySelector(".glass-panel");
            panel.style.backdropFilter = `blur(${blurVal}px)`;
            panel.style.borderRadius = `${corner}px`;
            panel.style.boxShadow = `0 8px 28px -8px rgba(0, 0, 0, 0.02), 0 0 0 0.5px rgba(210, 190, 225, 0.25)`;
            
            const addButton = document.querySelector(".add-btn");
            if(addButton) addButton.style.backgroundColor = primary;
            const batchBtn = document.querySelector(".batch-add-btn");
            if(batchBtn) batchBtn.style.backgroundColor = primary;
            const activeFilter = document.querySelector(".filter-btn.active");
            if(activeFilter) activeFilter.style.backgroundColor = primary;
            
            document.querySelectorAll(".task-text, .app-title, .stats, .task-priority, .clean-btn, .filter-btn, .add-btn, .task-btn, .batch-add-btn, .mode-btn").forEach(el => {
                if(el.classList.contains("task-text")) el.style.color = textColor;
                else if(el.classList.contains("app-title")) el.style.color = textColor;
                else if(el.classList.contains("stats")) el.style.color = textColor;
            });
            localStorage.setItem("hakumei_theme", JSON.stringify({
                primary, bgColor, textColor, blur: blurVal, corner
            }));
        }
        function loadTheme() {
            const saved = localStorage.getItem("hakumei_theme");
            if(saved) {
                const cfg = JSON.parse(saved);
                primaryColorPicker.value = cfg.primary;
                bgColorPicker.value = cfg.bgColor;
                textColorPicker.value = cfg.textColor;
                blurStrengthSlider.value = cfg.blur;
                cornerRoundSlider.value = cfg.corner;
            } else {
                primaryColorPicker.value = "#efe4f5";
                bgColorPicker.value = "#fefafd";
                textColorPicker.value = "#6f5284";
                blurStrengthSlider.value = "20";
                cornerRoundSlider.value = "32";
            }
            applyTheme();
        }
        primaryColorPicker.addEventListener("input", applyTheme);
        bgColorPicker.addEventListener("input", applyTheme);
        textColorPicker.addEventListener("input", applyTheme);
        blurStrengthSlider.addEventListener("input", () => {
            document.querySelector(".glass-panel").style.backdropFilter = `blur(${blurStrengthSlider.value}px)`;
            applyTheme();
        });
        cornerRoundSlider.addEventListener("input", () => {
            document.querySelector(".glass-panel").style.borderRadius = `${cornerRoundSlider.value}px`;
            applyTheme();
        });
        appTitleInput.addEventListener("blur", applyTheme);
        settingsToggle.addEventListener("click", () => {
            extraSettings.classList.toggle("open");
            settingsToggle.innerText = extraSettings.classList.contains("open") ? "✧ 閉じる" : "✧ その他";
        });

        loadTasks();
        loadTheme();
        filterBtns[0].classList.add("active");
        switchMode("single");
    })();
</script>
